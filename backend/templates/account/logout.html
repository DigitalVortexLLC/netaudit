{% extends "base_auth.html" %}
{% block title %}Sign Out — Netaudit{% endblock %}
{% block content %}
<div class="auth-container">
    <h2>Sign out</h2>
    <p class="auth-subtitle">Are you sure you want to sign out?</p>
    <form method="post" action="{% url 'account_logout' %}">
        {% csrf_token %}
        <button type="submit" class="btn-auth">Sign Out</button>
    </form>
    <div class="auth-links">
        <p><a href="{% url 'dashboard' %}">Go back to dashboard</a></p>
    </div>
</div>
{% endblock %}
