{% extends "base.html" %}
{% block title %}Logout — Netaudit{% endblock %}
{% block content %}
<div class="auth-container">
    <h2>Sign Out</h2>
    <p>Are you sure you want to sign out?</p>
    <form method="post" action="{% url 'account_logout' %}">
        {% csrf_token %}
        <button type="submit" class="btn btn-primary">Sign Out</button>
    </form>
</div>
{% endblock %}
