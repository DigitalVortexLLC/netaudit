{% extends "base.html" %}
{% load badge_tags %}
{% block title %}Users — Netaudit{% endblock %}
{% block content %}
<div class="page-header">
    <h2>Users</h2>
</div>
<table class="table">
    <thead>
        <tr>
            <th>Username</th>
            <th>Email</th>
            <th>Role</th>
            <th>Active</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for u in users %}
        <tr>
            <td>{{ u.username }}</td>
            <td>{{ u.email }}</td>
            <td>{{ u.role|badge }}</td>
            <td>{{ u.is_active|enabled_badge }}</td>
            <td><a href="{% url 'user-edit' u.pk %}" class="btn btn-sm">Edit</a></td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
