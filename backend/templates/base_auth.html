{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Netaudit{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=5">
    <meta name="csrf-token" content="{{ csrf_token }}">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-brand">
            <div class="auth-brand-content">
                <h1 class="auth-brand-logo">Netaudit</h1>
                <p class="auth-brand-tagline">Network Compliance,<br>Automated.</p>
            </div>
            <div class="auth-brand-footer">
                <p>Continuous auditing for network device configurations</p>
            </div>
        </div>
        <div class="auth-form-panel">
            {% if messages %}
            <div class="messages">
                {% for message in messages %}
                <div class="message message-{{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
